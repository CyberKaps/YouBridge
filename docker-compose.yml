services:
  db:
    image: postgres:16
    container_name: youbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: youbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d youbridge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
